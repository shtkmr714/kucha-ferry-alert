name: Dispatch Tokashiki & Yaeyama

# kucha-ferry-alert（座間味）が cron-job.org から workflow_dispatch で起動された後、
# 14:30 JST まで待機してから渡嘉敷・八重山を dispatch する。
#
# 14:30 JST を指定する理由:
#   Open-Meteo のモデルデータは当日 UTC 00:00 ランが UTC 05:00〜05:30 頃に出揃う。
#   JST 14:30 = UTC 05:30 がそのタイミングに相当し、朝投稿（UTC 18:00 前夜ラン）と
#   異なる最新データを取得できる最も早い時刻。
#   cron-job.org は 13:00 JST（UTC 04:00）に Zamami を発火させるが、
#   そのまま連鎖すると朝と同じデータになるため、ここで 14:30 まで待機する。
#
# ポイント:
#   - workflow_run の if 条件で event == 'workflow_dispatch' に絞り込むことで
#     GitHub Actions cron による遅延実行時には発火しない
#   - 渡嘉敷・八重山側の時刻ガードは workflow_dispatch を許可しているため問題なし
#   - timeout-minutes: 120（最大約90分の待機を想定）

on:
  workflow_run:
    workflows: ["Kucha Ferry Alert"]
    types: [completed]

jobs:
  dispatch:
    if: github.event.workflow_run.event == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Wait until 14:30 JST
        run: |
          TARGET_EPOCH=$(TZ=Asia/Tokyo date -d "today 14:30:00" +%s)
          NOW_EPOCH=$(TZ=Asia/Tokyo date +%s)
          SLEEP_SEC=$((TARGET_EPOCH - NOW_EPOCH))
          if [ $SLEEP_SEC -gt 0 ]; then
            echo "現在 $(TZ=Asia/Tokyo date '+%H:%M') JST → 14:30 JST まで ${SLEEP_SEC}秒 待機"
            sleep $SLEEP_SEC
          else
            echo "すでに 14:30 JST 以降 ($(TZ=Asia/Tokyo date '+%H:%M') JST) → 即時 dispatch"
          fi

      - name: Dispatch Tokashiki Ferry Logger
        run: |
          curl -s -o /dev/null -w "Tokashiki: HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"ref":"main"}' \
            https://api.github.com/repos/shtkmr714/tokashiki-logger/actions/workflows/280848344/dispatches

      - name: Dispatch Yaeyama All-Routes Logger
        run: |
          curl -s -o /dev/null -w "Yaeyama: HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"ref":"main"}' \
            https://api.github.com/repos/shtkmr714/yaeyama-all-routes-logger/actions/workflows/280839269/dispatches
