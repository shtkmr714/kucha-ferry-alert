name: Kucha Ferry Alert

on:
  schedule:
    - cron: '15 23 * * *'   # 08:15 JST（前夜UTC18:00 runを取得＝最新）
    - cron: '30 5 * * *'    # 14:30 JST（当日UTC00:00 runが出揃う時刻＝最新モデルを確実に取得）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ferry-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Debug secrets
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is EMPTY"
          else
            echo "SLACK_WEBHOOK_URL is SET (length: ${#SLACK_WEBHOOK_URL})"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests anthropic beautifulsoup4 lxml python-dotenv Pillow gspread google-auth

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Find font paths (debug)
        run: fc-list | grep -i noto

      - name: Run Ferry Alert Check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          python ferry_alert.py
